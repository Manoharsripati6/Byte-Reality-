<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>3D ML VR Visualization</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- ── Register A-Frame components BEFORE the scene ── -->
  <script>
    /* Fly controls: Q = up, E = down, Shift = fast */
    AFRAME.registerComponent('fly-controls', {
      schema: { speed: { default: 10 } },
      init() {
        this.keys = {};
        this.onKeyDown = e => { this.keys[e.key.toLowerCase()] = true; };
        this.onKeyUp = e => { this.keys[e.key.toLowerCase()] = false; };
        window.addEventListener('keydown', this.onKeyDown);
        window.addEventListener('keyup', this.onKeyUp);
      },
      tick(t, dt) {
        if (!dt) return;
        const speed = this.data.speed * (dt / 1000);
        const boost = this.keys['shift'] ? 2.5 : 1;
        const pos = this.el.object3D.position;
        if (this.keys['q']) pos.y += speed * boost;
        if (this.keys['e']) pos.y -= speed * boost;
      },
      remove() {
        window.removeEventListener('keydown', this.onKeyDown);
        window.removeEventListener('keyup', this.onKeyUp);
      }
    });

    /* Hover highlight: scale up + emissive glow on mouseenter */
    AFRAME.registerComponent('hover-highlight', {
      schema: {
        scaleFactor: { default: 1.4 },
        type: { default: 'sphere' } // 'sphere' or 'cylinder'
      },
      init() {
        this.origScale = null;
        this.origEmissive = null;
        this.origRadius = null;
        this.el.addEventListener('mouseenter', () => this.onEnter());
        this.el.addEventListener('mouseleave', () => this.onLeave());
      },
      onEnter() {
        const obj = this.el.object3D;
        this.origScale = { x: obj.scale.x, y: obj.scale.y, z: obj.scale.z };
        const s = this.data.scaleFactor;

        if (this.data.type === 'cylinder') {
          // For connections: thicken but don't lengthen
          obj.scale.set(s, 1, s);
        } else {
          obj.scale.set(s, s, s);
        }

        const mat = this.el.getAttribute('material');
        if (mat) {
          this.origEmissive = mat.emissiveIntensity || 0;
          this.el.setAttribute('material', 'emissiveIntensity', 0.8);
        }
      },
      onLeave() {
        if (this.origScale) {
          const obj = this.el.object3D;
          obj.scale.set(this.origScale.x, this.origScale.y, this.origScale.z);
        }
        if (this.origEmissive !== null) {
          this.el.setAttribute('material', 'emissiveIntensity', this.origEmissive);
        }
      }
    });

    /* Auto-rotate component */
    AFRAME.registerComponent('auto-rotate', {
      schema: {
        speed: { default: 15 },
        enabled: { default: false }
      },
      tick(t, dt) {
        if (!this.data.enabled) return;
        this.el.object3D.rotation.y += THREE.MathUtils.degToRad(this.data.speed * dt / 1000);
      }
    });

    /* Drag-rotate component: shift+drag to rotate the entity */
    AFRAME.registerComponent('drag-rotate', {
      schema: { enabled: { default: false }, sensitivity: { default: 0.4 } },
      init() {
        this.dragging = false;
        this.lastX = 0;
        this.lastY = 0;
        const canvas = this.el.sceneEl.canvas;

        this.onDown = (e) => {
          if (!this.data.enabled) return;
          this.dragging = true;
          this.lastX = e.clientX;
          this.lastY = e.clientY;
        };
        this.onMove = (e) => {
          if (!this.dragging) return;
          const dx = e.clientX - this.lastX;
          const dy = e.clientY - this.lastY;
          this.el.object3D.rotation.y += THREE.MathUtils.degToRad(dx * this.data.sensitivity);
          this.el.object3D.rotation.x += THREE.MathUtils.degToRad(dy * this.data.sensitivity);
          this.lastX = e.clientX;
          this.lastY = e.clientY;
        };
        this.onUp = () => { this.dragging = false; };

        // Defer to ensure canvas exists
        this.el.sceneEl.addEventListener('renderstart', () => {
          const c = this.el.sceneEl.canvas;
          c.addEventListener('mousedown', this.onDown);
          c.addEventListener('mousemove', this.onMove);
          c.addEventListener('mouseup', this.onUp);
          c.addEventListener('mouseleave', this.onUp);
        });
      }
    });
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a1a;
      --text: #e0e0e0;
      --text-muted: #b0b0d0;
      --panel-bg: rgba(15, 15, 35, 0.92);
      --panel-border: rgba(100, 140, 255, 0.3);
      --panel-border-light: rgba(100, 140, 255, 0.2);
      --accent: #8ab4ff;
      --accent-hover: rgba(100, 140, 255, 0.08);
      --btn-grad: linear-gradient(135deg, #4a7cff, #6f5cff);
      --btn-shadow: rgba(74, 124, 255, 0.4);
      --success: #6fdc6f;
      --error: #ff6b6b;
      --warning: #ffd93d;
    }

    body.light-mode {
      --bg: #f0f2f8;
      --text: #2a2a3a;
      --text-muted: #5a5a7a;
      --panel-bg: rgba(255, 255, 255, 0.94);
      --panel-border: rgba(80, 100, 180, 0.25);
      --panel-border-light: rgba(80, 100, 180, 0.15);
      --accent: #3a6ad8;
      --accent-hover: rgba(58, 106, 216, 0.08);
      --btn-grad: linear-gradient(135deg, #3a6ad8, #5b4ad8);
      --btn-shadow: rgba(58, 106, 216, 0.35);
      --success: #2a9d2a;
      --error: #d93636;
      --warning: #c8a000;
    }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      background: var(--bg); color: var(--text); overflow: hidden;
      transition: background 0.4s ease, color 0.4s ease;
    }

    .panel {
      position: fixed; z-index: 9999;
      background: var(--panel-bg); border: 1px solid var(--panel-border);
      border-radius: 12px; padding: 18px 22px; backdrop-filter: blur(14px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
      transition: background 0.4s ease, border-color 0.4s ease, box-shadow 0.4s ease;
    }

    #upload-panel { top: 20px; left: 20px; max-width: 340px; }
    #upload-panel .panel-header {
      display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px;
    }
    #upload-panel h2 {
      font-size: 16px; font-weight: 600;
      color: var(--accent); letter-spacing: 0.5px; margin: 0;
    }

    #theme-toggle {
      width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--panel-border);
      background: var(--panel-bg); cursor: pointer; font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.3s ease; color: var(--text);
    }
    #theme-toggle:hover { transform: scale(1.1); border-color: var(--accent); }

    #upload-panel label[for="file-input"] {
      display: block; cursor: pointer; text-align: center;
      padding: 14px 20px; border: 2px dashed var(--panel-border);
      border-radius: 8px; color: var(--accent); font-size: 13px;
      transition: all 0.2s ease; margin-bottom: 12px;
    }
    #upload-panel label[for="file-input"]:hover {
      border-color: var(--accent); background: var(--accent-hover);
    }
    #upload-panel label[for="file-input"].has-file { border-color: var(--success); color: var(--success); }
    #file-input { display: none; }

    .model-selector {
      display: flex; gap: 4px; margin-bottom: 12px; background: rgba(0,0,0,0.15);
      border-radius: 8px; padding: 3px;
    }
    .model-btn {
      flex: 1; padding: 7px 4px; border: none; border-radius: 6px;
      background: transparent; color: var(--text-muted); font-size: 11px;
      font-weight: 500; cursor: pointer; transition: all 0.2s ease; text-align: center;
    }
    .model-btn.active {
      background: var(--accent); color: #fff;
      box-shadow: 0 2px 8px rgba(74,124,255,0.3);
    }
    .model-btn:hover:not(.active) { color: var(--accent); }

    #upload-btn {
      width: 100%; padding: 11px; border: none; border-radius: 8px;
      background: var(--btn-grad); color: #fff;
      font-size: 14px; font-weight: 600; cursor: pointer;
      transition: all 0.2s ease;
    }
    #upload-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px var(--btn-shadow); }
    #upload-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

    #status { margin-top: 10px; font-size: 12px; min-height: 18px; transition: all 0.3s ease; }
    #status.error { color: var(--error); }
    #status.success { color: var(--success); }
    #status.loading { color: var(--warning); }

    #legend {
      bottom: 20px; left: 20px; border-color: var(--panel-border-light);
      font-size: 12px; display: none;
      transition: bottom 0.3s ease, background 0.4s ease, border-color 0.4s ease;
    }
    #legend.shifted-up { bottom: 340px; }
    #legend div { margin: 5px 0; display: flex; align-items: center; gap: 8px; color: var(--text); }
    #legend .dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; flex-shrink: 0; }

    #info-panel {
      top: 20px; right: 20px; border-color: var(--panel-border-light);
      font-size: 12px; display: none; min-width: 220px;
    }
    #info-panel h3 { color: var(--accent); margin-bottom: 8px; font-size: 13px; font-weight: 600; }
    #info-panel .info-row { margin: 4px 0; color: var(--text-muted); }
    #info-panel .info-row strong { color: var(--text); }
    #info-panel .model-badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 10px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px;
    }
    .badge-svm { background: rgba(255,68,102,0.2); color: #ff4466; }
    .badge-lr { background: rgba(68,221,102,0.2); color: #44dd66; }
    .badge-nn { background: rgba(180,140,255,0.2); color: #b48cff; }

    #controls-panel {
      bottom: 20px; right: 20px; border-color: var(--panel-border-light);
      font-size: 11px; display: none;
    }
    #controls-panel h3 { color: var(--accent); margin-bottom: 6px; font-size: 12px; font-weight: 600; }
    #controls-panel .control-row {
      display: flex; align-items: center; gap: 10px; margin: 6px 0; color: var(--text-muted);
    }
    #controls-panel .control-row label { min-width: 60px; font-size: 11px; }
    #controls-panel input[type="range"] {
      flex: 1; accent-color: var(--accent); height: 4px; cursor: pointer;
    }
    #controls-panel .control-row span { min-width: 30px; text-align: right; font-variant-numeric: tabular-nums; }

    .toggle-row { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
    .toggle-btn {
      flex: 1; padding: 6px 6px; border: 1px solid var(--panel-border);
      border-radius: 6px; background: transparent; color: var(--text-muted);
      font-size: 10px; cursor: pointer; transition: all 0.2s ease; text-align: center;
      min-width: 42px;
    }
    .toggle-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .toggle-btn:hover:not(.active) { border-color: var(--accent); color: var(--accent); }

    /* ── 3D Tooltip overlay ── */
    #tooltip-3d {
      position: fixed; z-index: 10000; pointer-events: none;
      background: var(--panel-bg); border: 1px solid var(--accent);
      border-radius: 8px; padding: 10px 14px; backdrop-filter: blur(14px);
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      font-size: 11px; color: var(--text); display: none;
      max-width: 220px; line-height: 1.5;
      transition: opacity 0.15s ease;
    }
    #tooltip-3d .tt-title {
      font-weight: 600; color: var(--accent); margin-bottom: 4px; font-size: 12px;
    }
    #tooltip-3d .tt-row { color: var(--text-muted); }
    #tooltip-3d .tt-row strong { color: var(--text); }
    #tooltip-3d .tt-divider {
      height: 1px; background: var(--panel-border); margin: 5px 0;
    }
    #tooltip-3d.pinned {
      pointer-events: auto; border-color: var(--success);
      box-shadow: 0 4px 20px rgba(111,220,111,0.2);
    }
    #tooltip-3d.pinned .tt-pin-hint { display: none; }
    .tt-pin-hint { font-size: 9px; color: var(--text-muted); opacity: 0.6; margin-top: 4px; }

    /* Training animation panel */
    #train-panel {
      bottom: 120px; left: 20px;
      border-color: rgba(180,140,255,0.4); display: none;
      min-width: 300px; max-width: 340px; text-align: center;
    }
    #train-panel h3 { color: #b48cff; margin-bottom: 10px; font-size: 14px; font-weight: 600; }
    #train-panel .train-stats {
      display: flex; justify-content: space-around; margin: 10px 0; font-size: 12px;
    }
    #train-panel .train-stat { text-align: center; }
    #train-panel .train-stat .stat-val {
      font-size: 18px; font-weight: 700; color: var(--accent); font-variant-numeric: tabular-nums;
    }
    #train-panel .train-stat .stat-label { font-size: 10px; color: var(--text-muted); margin-top: 2px; }
    #train-progress-bar {
      width: 100%; height: 6px; background: rgba(100,100,150,0.2);
      border-radius: 3px; overflow: hidden; margin: 10px 0;
    }
    #train-progress-fill {
      height: 100%; background: linear-gradient(90deg, #b48cff, #4499ff);
      border-radius: 3px; width: 0%; transition: width 0.15s ease;
    }
    .train-controls { display: flex; gap: 6px; margin-top: 10px; }
    .train-ctrl-btn {
      flex: 1; padding: 8px; border: 1px solid var(--panel-border);
      border-radius: 6px; background: transparent; color: var(--text);
      font-size: 12px; cursor: pointer; transition: all 0.2s ease;
    }
    .train-ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
    .train-ctrl-btn.primary {
      background: var(--btn-grad); color: #fff; border: none;
    }
    .train-ctrl-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #train-speed {
      width: 100%; accent-color: #b48cff; margin-top: 6px; height: 4px; cursor: pointer;
    }
    .speed-label { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    .loading-pulse { animation: pulse 1.2s ease infinite; }
  </style>
</head>
<body>

  <!-- 3D Tooltip (HTML overlay, positioned via JS) -->
  <div id="tooltip-3d"></div>

  <!-- Upload Panel -->
  <div id="upload-panel" class="panel">
    <div class="panel-header">
      <h2>ML VR Visualizer</h2>
      <button id="theme-toggle" title="Toggle light/dark mode">&#9790;</button>
    </div>
    <label id="file-label" for="file-input">
      Click to select dataset (.json)
    </label>
    <input type="file" id="file-input" accept=".json" />
    <div class="model-selector">
      <button class="model-btn active" data-model="svm">SVM</button>
      <button class="model-btn" data-model="linear_regression">Linear Reg</button>
      <button class="model-btn" data-model="neural_network">Neural Net</button>
    </div>
    <button id="upload-btn" disabled>Visualize</button>
    <button id="train-live-btn" disabled style="width:100%; padding:9px; border:1px solid rgba(180,140,255,0.4); border-radius:8px; background:transparent; color:#b48cff; font-size:12px; font-weight:600; cursor:pointer; margin-top:6px; transition:all 0.2s ease;">Train Live (NN)</button>
    <div id="status"></div>
  </div>

  <!-- Training Animation Panel -->
  <div id="train-panel" class="panel">
    <h3>Neural Network Training</h3>
    <div class="train-stats">
      <div class="train-stat">
        <div class="stat-val" id="train-epoch">0</div>
        <div class="stat-label">Epoch</div>
      </div>
      <div class="train-stat">
        <div class="stat-val" id="train-acc">0%</div>
        <div class="stat-label">Accuracy</div>
      </div>
      <div class="train-stat">
        <div class="stat-val" id="train-loss">-</div>
        <div class="stat-label">Loss</div>
      </div>
    </div>
    <div id="train-progress-bar"><div id="train-progress-fill"></div></div>
    <div class="train-controls">
      <button class="train-ctrl-btn" id="train-prev" disabled>&lt; Prev</button>
      <button class="train-ctrl-btn primary" id="train-play">Play</button>
      <button class="train-ctrl-btn" id="train-next" disabled>Next &gt;</button>
      <button class="train-ctrl-btn" id="train-close">Close</button>
    </div>
    <input type="range" id="train-speed" min="100" max="2000" value="500" step="100" />
    <div class="speed-label">Speed: <span id="train-speed-val">500</span>ms / frame</div>
  </div>

  <!-- Legend -->
  <div id="legend" class="panel">
    <div><span class="dot" style="background:#ff4466;"></span> Class 0</div>
    <div><span class="dot" style="background:#4499ff;"></span> Class 1</div>
    <div><span class="dot" style="background:rgba(180,140,255,0.6);"></span> <span id="legend-boundary-text">Decision Boundary</span></div>
  </div>

  <!-- Info Panel -->
  <div id="info-panel" class="panel">
    <h3>Model Info</h3>
    <div id="info-content"></div>
  </div>

  <!-- Controls Panel -->
  <div id="controls-panel" class="panel">
    <h3>Controls</h3>
    <div class="control-row">
      <label>Point Size</label>
      <input type="range" id="point-size" min="0.03" max="0.2" step="0.01" value="0.08" />
      <span id="point-size-val">0.08</span>
    </div>
    <div class="control-row">
      <label>Boundary</label>
      <input type="range" id="plane-opacity" min="0.05" max="0.6" step="0.01" value="0.18" />
      <span id="plane-opacity-val">0.18</span>
    </div>
    <div class="toggle-row">
      <button class="toggle-btn active" id="toggle-points">Points</button>
      <button class="toggle-btn active" id="toggle-plane">Boundary</button>
      <button class="toggle-btn active" id="toggle-axes">Axes</button>
      <button class="toggle-btn active" id="toggle-env">Env</button>
      <button class="toggle-btn" id="toggle-nn" style="display:none">NN</button>
    </div>
    <div class="toggle-row" style="margin-top: 6px;">
      <button class="toggle-btn" id="toggle-rotate">Rotate</button>
      <button class="toggle-btn" id="toggle-drag">Drag</button>
    </div>
  </div>

  <!-- A-Frame Scene -->
  <a-scene id="vr-scene" vr-mode-ui="enabled: true" embedded
    fog="type: exponential; color: #020208; density: 0.006"
    style="position: fixed; top: 0; left: 0; width: 100%; height: 100%;">

    <a-sky id="scene-sky" color="#020208"></a-sky>
    <a-entity id="scene-fog"></a-entity>

    <a-entity id="rig" position="0 2 8" fly-controls="speed: 10">
      <a-camera id="main-camera" wasd-controls="acceleration: 20; fly: true" look-controls="pointerLockEnabled: false">
        <a-cursor color="#8ab4ff" fuse="false"
          raycaster="objects: .interactive; far: 50"></a-cursor>
      </a-camera>
    </a-entity>

    <a-light id="light-ambient" type="ambient" color="#445566" intensity="0.6"></a-light>
    <a-light type="directional" color="#ffffff" intensity="0.8" position="2 4 3"></a-light>
    <a-light type="directional" color="#6688cc" intensity="0.3" position="-3 2 -2"></a-light>
    <a-light type="point" color="#ffffff" intensity="0.2" position="0 3 0"></a-light>
    <a-light type="point" color="#334488" intensity="0.15" position="0 -3 0" distance="30"></a-light>
    <a-light type="point" color="#443366" intensity="0.1" position="-10 5 -15" distance="40"></a-light>

    <!-- VR Environment -->
    <a-entity id="environment-group">

      <!-- ══════════ GROUND: dark reflective floor ══════════ -->
      <a-plane id="ground-plane" position="0 -4 0" rotation="-90 0 0" width="300" height="300"
        material="color: #030308; metalness: 0.9; roughness: 0.1; opacity: 0.98"></a-plane>

      <!-- ══════════ NEON GRID on ground ══════════ -->
      <a-entity id="ground-grid" position="0 -3.96 0" rotation="-90 0 0">
        <a-box position="-20 0 0" width="0.015" height="80" depth="0.003" material="color: #0a1540; opacity: 0.4; emissive: #0a1540; emissiveIntensity: 0.3"></a-box>
        <a-box position="-10 0 0" width="0.015" height="80" depth="0.003" material="color: #0e1d55; opacity: 0.5; emissive: #0e1d55; emissiveIntensity: 0.4"></a-box>
        <a-box position="0 0 0"   width="0.025" height="80" depth="0.003" material="color: #1a3399; opacity: 0.7; emissive: #1a3399; emissiveIntensity: 0.6"></a-box>
        <a-box position="10 0 0"  width="0.015" height="80" depth="0.003" material="color: #0e1d55; opacity: 0.5; emissive: #0e1d55; emissiveIntensity: 0.4"></a-box>
        <a-box position="20 0 0"  width="0.015" height="80" depth="0.003" material="color: #0a1540; opacity: 0.4; emissive: #0a1540; emissiveIntensity: 0.3"></a-box>
        <a-box position="0 -20 0" width="80" height="0.015" depth="0.003" material="color: #0a1540; opacity: 0.4; emissive: #0a1540; emissiveIntensity: 0.3"></a-box>
        <a-box position="0 -10 0" width="80" height="0.015" depth="0.003" material="color: #0e1d55; opacity: 0.5; emissive: #0e1d55; emissiveIntensity: 0.4"></a-box>
        <a-box position="0 0 0"   width="80" height="0.025" depth="0.003" material="color: #1a3399; opacity: 0.7; emissive: #1a3399; emissiveIntensity: 0.6"></a-box>
        <a-box position="0 10 0"  width="80" height="0.015" depth="0.003" material="color: #0e1d55; opacity: 0.5; emissive: #0e1d55; emissiveIntensity: 0.4"></a-box>
        <a-box position="0 20 0"  width="80" height="0.015" depth="0.003" material="color: #0a1540; opacity: 0.4; emissive: #0a1540; emissiveIntensity: 0.3"></a-box>

  <script>
    /* ══════════════ Tooltip System ══════════════ */
    const tooltip = document.getElementById('tooltip-3d');
    let tooltipPinned = false;
    let tooltipTarget = null;

    function showTooltip(el, html, event) {
      if (tooltipPinned && tooltipTarget !== el) return; // don't override pinned

      tooltip.innerHTML = html;
      tooltip.style.display = 'block';

      // Position near cursor
      const rect = document.body.getBoundingClientRect();
      let x, y;
      if (event && event.clientX !== undefined) {
        x = event.clientX + 15;
        y = event.clientY - 10;
      } else {
        // Fallback: project 3D position to screen
        const pos = el.object3D.getWorldPosition(new THREE.Vector3());
        const camera = document.getElementById('main-camera').getObject3D('camera');
        const canvas = document.querySelector('canvas');
        pos.project(camera);
        x = (pos.x * 0.5 + 0.5) * canvas.clientWidth + 15;
        y = (-pos.y * 0.5 + 0.5) * canvas.clientHeight - 10;
      }

      // Keep on screen
      x = Math.min(x, window.innerWidth - 240);
      y = Math.max(y, 10);
      y = Math.min(y, window.innerHeight - 100);

      tooltip.style.left = x + 'px';
      tooltip.style.top = y + 'px';
    }

    function hideTooltip(el) {
      if (tooltipPinned && tooltipTarget === el) return;
      tooltip.style.display = 'none';
    }

    function pinTooltip(el) {
      if (tooltipPinned && tooltipTarget === el) {
        // Unpin
        tooltipPinned = false;
        tooltipTarget = null;
        tooltip.classList.remove('pinned');
        tooltip.style.display = 'none';
      } else {
        tooltipPinned = true;
        tooltipTarget = el;
        tooltip.classList.add('pinned');
      }
    }

    // Click anywhere else to unpin
    document.addEventListener('click', (e) => {
      if (tooltipPinned && !tooltip.contains(e.target)) {
        // Check if click is on canvas (3D scene)
        if (e.target.tagName === 'CANVAS') return; // let A-Frame handle it
      }
    });

    /* ══════════════ Theme ══════════════ */
    const body = document.body;
    const themeToggle = document.getElementById('theme-toggle');
    let isDark = true;

    function applyTheme() {
      const sky = document.getElementById('scene-sky');
      const cube = document.getElementById('bounding-cube');
      const ambient = document.getElementById('light-ambient');
      const ground = document.getElementById('ground-plane');
      const scene = document.getElementById('vr-scene');
      const envGroup = document.getElementById('environment-group');

      // All dark-mode-only elements
      const starfield = document.querySelectorAll('#starfield-container a-sphere');
      const energyOrbs = envGroup.querySelectorAll(':scope > a-sphere');
      const auroraPlanes = envGroup.querySelectorAll(':scope > a-plane:not(#ground-plane)');
      const vertBeams = envGroup.querySelectorAll(':scope > a-cylinder');
      const gridBoxes = document.querySelectorAll('#ground-grid a-box');
      const floorRings = envGroup.querySelectorAll(':scope > a-torus');
      const glowDisc = envGroup.querySelector(':scope > a-circle');
      const wireShapes = document.querySelectorAll('a-icosahedron, a-octahedron, a-dodecahedron, a-tetrahedron');
      const orbitRings = envGroup.querySelectorAll(':scope > a-entity > a-torus');
      // Beacon pillars: child entities that contain both a-cylinder and a-sphere
      const beaconPillars = Array.from(envGroup.querySelectorAll(':scope > a-entity')).filter(
        ent => ent.querySelector('a-cylinder') && ent.querySelector('a-sphere')
      );

      if (isDark) {
        body.classList.remove('light-mode');
        themeToggle.innerHTML = '&#9790;';
        sky.setAttribute('color', '#020208');
        cube.setAttribute('material', 'color: #334466; wireframe: true; opacity: 0.3');
        ambient.setAttribute('intensity', '0.6');
        ground.setAttribute('material', 'color: #030308; metalness: 0.9; roughness: 0.1; opacity: 0.98');
        scene.setAttribute('fog', 'type: exponential; color: #020208; density: 0.006');

        // Show starfield + energy orbs
        starfield.forEach(s => s.setAttribute('visible', true));
        energyOrbs.forEach(s => s.setAttribute('visible', true));

        // Show aurora + beams
        auroraPlanes.forEach(p => p.setAttribute('visible', true));
        vertBeams.forEach(c => c.setAttribute('visible', true));

        // Beacon pillars
        beaconPillars.forEach(ent => {
          ent.querySelector('a-cylinder').setAttribute('material', 'opacity', '0.08');
          ent.querySelector('a-sphere').setAttribute('material', 'opacity', '0.5');
        });

        // Grid lines
        gridBoxes.forEach(b => {
          const w = parseFloat(b.getAttribute('width') || '0');
          const h = parseFloat(b.getAttribute('height') || '0');
          const maxDim = Math.max(w, h);
          if (maxDim > 0.02) {
            b.setAttribute('material', 'color: #1a3399; opacity: 0.7; emissive: #1a3399; emissiveIntensity: 0.6');
          } else if (maxDim > 0.01) {
            b.setAttribute('material', 'color: #0e1d55; opacity: 0.5; emissive: #0e1d55; emissiveIntensity: 0.4');
          } else {
            b.setAttribute('material', 'color: #081030; opacity: 0.2; emissive: #081030; emissiveIntensity: 0.2');
          }
        });

        // Floor rings
        floorRings.forEach(t => {
          t.setAttribute('material', 'color', '#2255ff');
          t.setAttribute('material', 'emissive', '#2255ff');
          t.setAttribute('material', 'emissiveIntensity', '0.5');
          t.setAttribute('material', 'opacity', '0.2');
        });

        // Wireframe shapes
        wireShapes.forEach(s => {
          s.setAttribute('material', 'emissiveIntensity', '0.4');
          s.setAttribute('material', 'opacity', '0.12');
        });

        // Glow disc
        if (glowDisc) glowDisc.setAttribute('material', 'color: #1133aa; opacity: 0.12; emissive: #2244dd; emissiveIntensity: 0.5; side: double');

        // Orbiting rings
        orbitRings.forEach(t => {
          t.setAttribute('material', 'emissiveIntensity', '0.3');
          t.setAttribute('material', 'opacity', '0.08');
        });

      } else {
        body.classList.add('light-mode');
        themeToggle.innerHTML = '&#9728;';
        sky.setAttribute('color', '#e8edf8');
        cube.setAttribute('material', 'color: #5577aa; wireframe: true; opacity: 0.5');
        ambient.setAttribute('intensity', '1.3');
        ground.setAttribute('material', 'color: #c8d4e8; metalness: 0.1; roughness: 0.7; opacity: 0.95');
        scene.setAttribute('fog', 'type: exponential; color: #e8edf8; density: 0.008');

        // Hide starfield + energy orbs (look bad on light sky)
        starfield.forEach(s => s.setAttribute('visible', false));
        energyOrbs.forEach(s => s.setAttribute('visible', false));

        // Hide aurora + beams
        auroraPlanes.forEach(p => p.setAttribute('visible', false));
        vertBeams.forEach(c => c.setAttribute('visible', false));

        // Tone down beacon pillars
        beaconPillars.forEach(ent => {
          const cyl = ent.querySelector('a-cylinder');

          cyl.setAttribute('material', 'color: #8899bb; opacity: 0.1; emissive: #8899bb; emissiveIntensity: 0.05');
          sph.setAttribute('material', 'color: #7799cc; opacity: 0.25; emissive: #7799cc; emissiveIntensity: 0.1');
        });

        // Grid: soft pastel lines
        gridBoxes.forEach(b => {
          const w = parseFloat(b.getAttribute('width') || '0');
          const h = parseFloat(b.getAttribute('height') || '0');
          const maxDim = Math.max(w, h);

        // Floor rings: very subtle
        floorRings.forEach(t => {
          t.setAttribute('material', 'color', '#8899cc');
          t.setAttribute('material', 'emissive', '#8899cc');
          t.setAttribute('material', 'emissiveIntensity', '0.05');
          t.setAttribute('material', 'opacity', '0.1');
        });

        // Wireframe shapes: muted
        wireShapes.forEach(s => {
          s.setAttribute('material', 'color', '#7788bb');
          s.setAttribute('material', 'emissive', '#7788bb');
          s.setAttribute('material', 'emissiveIntensity', '0.08');
          s.setAttribute('material', 'opacity', '0.1');

        // Glow disc: minimal
        if (glowDisc) glowDisc.setAttribute('material', 'color: #99aacc; opacity: 0.06; emissive: #99aacc; emissiveIntensity: 0.03; side: double');

        // Orbiting rings: barely visible

          t.setAttribute('material', 'color', '#8899cc');
          t.setAttribute('material', 'emissive', '#8899cc');
          t.setAttribute('material', 'emissiveIntensity', '0.04');
          t.setAttribute('material', 'opacity', '0.05');
        });
      }
    }
    applyTheme(); // apply on load
    themeToggle.addEventListener('click', () => { isDark = !isDark; applyTheme(); });

    /* ══════════════ Model Selection ══════════════ */

    /* ══════════════ Upload ══════════════ */

    const legend = document.getElementById('legend');

    const infoContent = document.getElementById('info-content');

    let selectedFile = null;

    fileInput.addEventListener('change', (e) => {
      selectedFile = e.target.files[0];

    uploadBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      uploadBtn.disabled = true;

      statusEl.textContent = `Training ${selectedModel.replace(/_/g, ' ')}...`;

      const formData = new FormData();
      formData.append('file', selectedFile);
      formData.append('model', selectedModel);

      try {
        const res = await fetch('/upload', { method: 'POST', body: formData });

        if (!res.ok) throw new Error(data.error || 'Upload failed');

        statusEl.className = 'success';
        statusEl.textContent = `Trained on ${data.num_points} points. Loading...`;

        const mi = data.model_info;

        if (mi.model_type === 'svm') {

            <span class="model-badge badge-svm">SVM (Linear)</span>
            <div class="info-row">Points: <strong>${data.num_points}</strong></div>

            <div class="info-row">b: ${mi.bias.toFixed(3)}</div>`;
          document.getElementById('legend-boundary-text').textContent = 'SVM Decision Plane';
        } else if (mi.model_type === 'linear_regression') {
          infoHTML = `
            <span class="model-badge badge-lr">Linear Regression</span>
            <div class="info-row">Points: <strong>${data.num_points}</strong></div>
            <div class="info-row">R\u00b2: <strong>${mi.r_squared}</strong></div>
            <div class="info-row">W: [${mi.weights.map(v => v.toFixed(3)).join(', ')}]</div>
            <div class="info-row">b: ${mi.bias.toFixed(3)}</div>`;
          document.getElementById('legend-boundary-text').textContent = 'Regression Surface';
        } else if (mi.model_type === 'neural_network') {
          infoHTML = `
            <span class="model-badge badge-nn">Neural Network</span>
            <div class="info-row">Points: <strong>${data.num_points}</strong></div>
            <div class="info-row">Accuracy: <strong>${mi.accuracy}%</strong></div>
            <div class="info-row">Layers: <strong>${mi.layers.join(' \u2192 ')}</strong></div>
            <div class="info-row">Iterations: <strong>${mi.iterations}</strong></div>`;

        statusEl.textContent = 'Visualization ready! Hover points to inspect.';

        controlsPanel.style.display = 'block';

      } catch (err) {

    /* ══════════════ Data Visualization ══════════════ */
    const COLORS = { 0: '#ff4466', 1: '#4499ff', 2: '#44ff88', 3: '#ffaa44' };
    const COLOR_NAMES = { 0: 'Red (0)', 1: 'Blue (1)', 2: 'Green (2)', 3: 'Orange (3)' };
    const BOUNDARY_COLORS = { svm: '#b48cff', linear_regression: '#44dd88', neural_network: '#ff88cc' };

    async function loadVisualization(modelType) {
      const pointsContainer = document.getElementById('data-points');
      const planeContainer = document.getElementById('decision-boundary');
      pointsContainer.innerHTML = '';
      planeContainer.innerHTML = '';

      // Reset pinned tooltip
      tooltipPinned = false;
      tooltipTarget = null;
      tooltip.classList.remove('pinned');
      tooltip.style.display = 'none';

      const ts = Date.now();
      const [pointsRes, planeRes] = await Promise.all([
        fetch(`/static/points.json?t=${ts}`),
        fetch(`/static/plane.json?t=${ts}`)
      ]);
      const pointsData = await pointsRes.json();
      const planeData = await planeRes.json();

      // Render interactive data points
      const radius = parseFloat(document.getElementById('point-size').value);
      pointsData.points.forEach((pt, idx) => {
        const sphere = document.createElement('a-sphere');
        sphere.setAttribute('position', `${pt.x} ${pt.y} ${pt.z}`);
        sphere.setAttribute('radius', String(radius));
        sphere.setAttribute('color', COLORS[pt.label] || '#ffffff');
        sphere.setAttribute('material',
          `opacity: 0.92; metalness: 0.2; roughness: 0.5; emissive: ${COLORS[pt.label] || '#ffffff'}; emissiveIntensity: 0.05`);
        sphere.setAttribute('class', 'interactive data-point');
        sphere.setAttribute('hover-highlight', 'scaleFactor: 1.5');

        // Store data for tooltip
        sphere.dataset.px = pt.x.toFixed(3);
        sphere.dataset.py = pt.y.toFixed(3);
        sphere.dataset.pz = pt.z.toFixed(3);
        sphere.dataset.label = pt.label;
        sphere.dataset.idx = idx;

        // Hover events
        sphere.addEventListener('mouseenter', function(e) {
          const d = this.dataset;
          showTooltip(this, `
            <div class="tt-title">Data Point #${d.idx}</div>
            <div class="tt-row">X: <strong>${d.px}</strong></div>
            <div class="tt-row">Y: <strong>${d.py}</strong></div>
            <div class="tt-row">Z: <strong>${d.pz}</strong></div>
            <div class="tt-divider"></div>
            <div class="tt-row">Class: <strong style="color:${COLORS[d.label]}">${COLOR_NAMES[d.label] || d.label}</strong></div>
            <div class="tt-pin-hint">Click to pin</div>
          `, e.detail && e.detail.cursorEl ? null : e);
        });
        sphere.addEventListener('mouseleave', function() { hideTooltip(this); });
        sphere.addEventListener('click', function() { pinTooltip(this); });

        pointsContainer.appendChild(sphere);
      });

      // Render decision boundary
      const opacity = parseFloat(document.getElementById('plane-opacity').value);
      const boundaryColor = BOUNDARY_COLORS[modelType] || '#b48cff';
      const step = 5.0 / 30;
      planeData.plane.forEach((pt) => {
        const box = document.createElement('a-box');
        box.setAttribute('position', `${pt.x} ${pt.y} ${pt.z}`);
        box.setAttribute('width', String(step));
        box.setAttribute('height', String(step));
        box.setAttribute('depth', String(step));
        box.setAttribute('material',
          `color: ${boundaryColor}; opacity: ${opacity}; transparent: true; side: double; metalness: 0.05; roughness: 0.9`);
        box.setAttribute('class', 'plane-cell');
        planeContainer.appendChild(box);
      });
    }

    /* ══════════════ Neural Network 3D ══════════════ */
    const LAYER_COLORS = ['#ff4466', '#ffaa44', '#44dd66', '#4499ff', '#b48cff', '#ff88cc'];
    const NN_LAYER_LABELS = ['Input', 'Hidden 1', 'Hidden 2', 'Output'];

    async function renderNeuralNetwork() {
      const neuronsEl = document.getElementById('nn-neurons');
      const connectionsEl = document.getElementById('nn-connections');
      const labelsEl = document.getElementById('nn-labels');
      neuronsEl.innerHTML = '';
      connectionsEl.innerHTML = '';
      labelsEl.innerHTML = '';

      const ts = Date.now();
      const res = await fetch(`/static/network.json?t=${ts}`);
      const net = await res.json();

      const layers = net.layers;
      const weights = net.weights;
      const biases = net.biases;
      const activations = net.activations;
      const numLayers = layers.length;

      const totalWidth = 8;
      const maxHeight = 4;
      const layerSpacing = totalWidth / (numLayers - 1);
      const startX = -totalWidth / 2;
      const MAX_DISPLAY = 12;
      const positions = [];

      for (let l = 0; l < numLayers; l++) {
        const n = layers[l];
        const displayN = Math.min(n, MAX_DISPLAY);
        const skipped = n - displayN;
        const spacing = displayN > 1 ? maxHeight / (displayN - 1) : 0;
        const startY = displayN > 1 ? -maxHeight / 2 : 0;
        const x = startX + l * layerSpacing;
        const layerPos = [];

        for (let j = 0; j < displayN; j++) {
          const y = startY + j * spacing;
          layerPos.push({ x, y, z: 0 });

          let intensity = 0.5;
          let actVal = 0;
          if (activations && activations[l] && activations[l][j] !== undefined) {
            actVal = activations[l][j];
            intensity = Math.min(1.0, Math.abs(actVal) / (Math.max(...activations[l].map(Math.abs)) + 1e-8));
          }

          let biasVal = 0;
          if (biases && l > 0 && biases[l - 1] && biases[l - 1][j] !== undefined) {
            biasVal = biases[l - 1][j];
          }

          const color = LAYER_COLORS[l % LAYER_COLORS.length];
          const radius = l === 0 || l === numLayers - 1 ? 0.15 : 0.11;
          const sphere = document.createElement('a-sphere');
          sphere.setAttribute('position', `${x} ${y} 0`);
          sphere.setAttribute('radius', String(radius));
          sphere.setAttribute('material',
            `color: ${color}; opacity: ${0.5 + intensity * 0.5}; emissive: ${color}; emissiveIntensity: ${0.2 + intensity * 0.4}; metalness: 0.3; roughness: 0.4`);
          sphere.setAttribute('class', 'interactive nn-neuron');
          sphere.setAttribute('hover-highlight', 'scaleFactor: 1.6');

          // Store metadata
          const layerName = l < NN_LAYER_LABELS.length ? NN_LAYER_LABELS[l] : `Layer ${l}`;
          sphere.dataset.layer = l;
          sphere.dataset.layerName = layerName;
          sphere.dataset.neuronIdx = j;
          sphere.dataset.activation = actVal.toFixed(4);
          sphere.dataset.bias = biasVal.toFixed(4);
          sphere.dataset.layerSize = n;

          // Neuron hover events
          sphere.addEventListener('mouseenter', function(e) {
            const d = this.dataset;
            let html = `
              <div class="tt-title">${d.layerName} - Neuron ${d.neuronIdx}</div>
              <div class="tt-row">Layer: <strong>${d.layer} / ${numLayers - 1}</strong> (size ${d.layerSize})</div>
              <div class="tt-row">Activation: <strong>${d.activation}</strong></div>`;
            if (parseInt(d.layer) > 0) {
              html += `<div class="tt-row">Bias: <strong>${d.bias}</strong></div>`;
            }
            html += `<div class="tt-pin-hint">Click to pin</div>`;
            showTooltip(this, html, e.detail && e.detail.cursorEl ? null : e);

            // Highlight connected edges
            highlightNeuronConnections(parseInt(d.layer), parseInt(d.neuronIdx), true);
          });
          sphere.addEventListener('mouseleave', function() {
            hideTooltip(this);
            highlightNeuronConnections(parseInt(this.dataset.layer), parseInt(this.dataset.neuronIdx), false);
          });
          sphere.addEventListener('click', function() { pinTooltip(this); });

          neuronsEl.appendChild(sphere);
        }

        if (skipped > 0) {
          const dots = document.createElement('a-text');
          dots.setAttribute('value', `+${skipped} more`);
          dots.setAttribute('position', `${x} ${startY - 0.5} 0`);
          dots.setAttribute('color', '#8888aa');
          dots.setAttribute('scale', '0.35 0.35 0.35');
          dots.setAttribute('align', 'center');
          labelsEl.appendChild(dots);
        }

        const labelName = l < NN_LAYER_LABELS.length ? NN_LAYER_LABELS[l] : `Layer ${l}`;
        const label = document.createElement('a-text');
        label.setAttribute('value', `${labelName}\n(${n})`);
        label.setAttribute('position', `${x} ${maxHeight / 2 + 0.6} 0`);
        label.setAttribute('color', LAYER_COLORS[l % LAYER_COLORS.length]);
        label.setAttribute('scale', '0.45 0.45 0.45');
        label.setAttribute('align', 'center');
        labelsEl.appendChild(label);

        positions.push(layerPos);
      }

      // Draw connections
      for (let l = 0; l < numLayers - 1; l++) {
        const fromPos = positions[l];
        const toPos = positions[l + 1];
        const W = weights[l];
        const maxW = Math.max(...W.flat().map(Math.abs), 1e-8);

        for (let i = 0; i < fromPos.length; i++) {
          for (let j = 0; j < toPos.length; j++) {
            let wVal = 0;
            if (W[i] && W[i][j] !== undefined) wVal = W[i][j];
            const absW = Math.abs(wVal);
            const normalizedW = absW / maxW;
            if (normalizedW < 0.08) continue;

            const from = fromPos[i];
            const to = toPos[j];
            const mx = (from.x + to.x) / 2;
            const my = (from.y + to.y) / 2;
            const mz = (from.z + to.z) / 2;
            const dx = to.x - from.x;
            const dy = to.y - from.y;
            const dz = to.z - from.z;
            const length = Math.sqrt(dx * dx + dy * dy + dz * dz);
            const rotZ = -Math.atan2(dx, dy) * (180 / Math.PI);
            const rotX = Math.atan2(dz, Math.sqrt(dx * dx + dy * dy)) * (180 / Math.PI);

            const color = wVal >= 0 ? '#4499ff' : '#ff4466';
            const opacity = 0.08 + normalizedW * 0.35;
            const radius = 0.005 + normalizedW * 0.02;

            const cyl = document.createElement('a-cylinder');
            cyl.setAttribute('position', `${mx} ${my} ${mz}`);
            cyl.setAttribute('height', String(length));
            cyl.setAttribute('radius', String(radius));
            cyl.setAttribute('rotation', `${rotX} 0 ${rotZ}`);
            cyl.setAttribute('material',
              `color: ${color}; opacity: ${opacity}; transparent: true; emissive: ${color}; emissiveIntensity: 0.15`);
            cyl.setAttribute('class', 'interactive nn-connection');
            cyl.setAttribute('hover-highlight', 'scaleFactor: 2.5; type: cylinder');

            // Connection metadata
            cyl.dataset.fromLayer = l;
            cyl.dataset.fromIdx = i;
            cyl.dataset.toLayer = l + 1;
            cyl.dataset.toIdx = j;
            cyl.dataset.weight = wVal.toFixed(5);

            cyl.addEventListener('mouseenter', function(e) {
              const d = this.dataset;
              const fromName = parseInt(d.fromLayer) < NN_LAYER_LABELS.length ? NN_LAYER_LABELS[d.fromLayer] : `Layer ${d.fromLayer}`;
              const toName = parseInt(d.toLayer) < NN_LAYER_LABELS.length ? NN_LAYER_LABELS[d.toLayer] : `Layer ${d.toLayer}`;
              const w = parseFloat(d.weight);
              const sign = w >= 0 ? '+' : '';
              showTooltip(this, `
                <div class="tt-title">Connection</div>
                <div class="tt-row">${fromName}[${d.fromIdx}] \u2192 ${toName}[${d.toIdx}]</div>
                <div class="tt-divider"></div>
                <div class="tt-row">Weight: <strong style="color:${w >= 0 ? '#4499ff' : '#ff4466'}">${sign}${d.weight}</strong></div>
                <div class="tt-row">|W|: <strong>${Math.abs(w).toFixed(5)}</strong></div>
              `, e.detail && e.detail.cursorEl ? null : e);
            });
            cyl.addEventListener('mouseleave', function() { hideTooltip(this); });
            cyl.addEventListener('click', function() { pinTooltip(this); });

            connectionsEl.appendChild(cyl);
          }
        }
      }
    }

    // Highlight all connections from/to a specific neuron
    function highlightNeuronConnections(layer, idx, highlight) {
      document.querySelectorAll('.nn-connection').forEach(conn => {
        const fl = parseInt(conn.dataset.fromLayer);
        const fi = parseInt(conn.dataset.fromIdx);
        const tl = parseInt(conn.dataset.toLayer);
        const ti = parseInt(conn.dataset.toIdx);

        if ((fl === layer && fi === idx) || (tl === layer && ti === idx)) {
          if (highlight) {
            conn.setAttribute('material', 'opacity', 0.7);
            conn.object3D.scale.set(2, 1, 2);
          } else {
            // Restore original opacity from weight magnitude
            const w = Math.abs(parseFloat(conn.dataset.weight));
            const origOp = 0.08 + Math.min(w / 2, 1) * 0.35;
            conn.setAttribute('material', 'opacity', Math.min(origOp, 0.43));
            conn.object3D.scale.set(1, 1, 1);
          }
        }
      });
    }

    /* ══════════════ Controls ══════════════ */
    const pointSizeSlider = document.getElementById('point-size');
    const pointSizeVal = document.getElementById('point-size-val');
    pointSizeSlider.addEventListener('input', () => {

    /* ══════════════ Procedural Star Field (tiny bright dots) ══════════════ */
    (function generateStarField() {
      const container = document.getElementById('starfield-container');
      if (!container) return;
      const starCount = 300;
      const colors = ['#ffffff', '#ccddff', '#aabbff', '#ddeeff', '#bbccff', '#ffeedd', '#aaccff'];
      for (let i = 0; i < starCount; i++) {
        const star = document.createElement('a-sphere');
        const dist = 60 + Math.random() * 100;       // 60–160 units away
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.random() * Math.PI * 0.65;  // upper hemisphere
        const x = dist * Math.sin(phi) * Math.cos(theta);
        const y = 2 + dist * Math.cos(phi);
        const z = dist * Math.sin(phi) * Math.sin(theta) * (Math.random() > 0.5 ? -1 : 1);
        const r = 0.02 + Math.random() * 0.08;       // tiny radius
        const col = colors[Math.floor(Math.random() * colors.length)];
        const emI = (0.6 + Math.random() * 0.4).toFixed(2);
        star.setAttribute('position', `${x.toFixed(1)} ${y.toFixed(1)} ${z.toFixed(1)}`);
        star.setAttribute('radius', r.toFixed(3));
        star.setAttribute('material', `color: ${col}; emissive: ${col}; emissiveIntensity: ${emI}; opacity: 1`);
        // ~25% twinkle
        if (Math.random() < 0.25) {
          const dur = 1500 + Math.random() * 3000;
          star.setAttribute('animation', `property: material.emissiveIntensity; from: 0.3; to: ${emI}; dur: ${Math.round(dur)}; dir: alternate; loop: true`);
        }
        container.appendChild(star);
      }
    })();

    // Auto-rotate toggle
    const rotateBtn = document.getElementById('toggle-rotate');
    rotateBtn.addEventListener('click', () => {
      rotateBtn.classList.toggle('active');
      const enabled = rotateBtn.classList.contains('active');
      document.getElementById('coord-system').setAttribute('auto-rotate', 'enabled', enabled);
    });

    // Drag-rotate toggle
    const dragBtn = document.getElementById('toggle-drag');
    const mainCam = document.getElementById('main-camera');
    dragBtn.addEventListener('click', () => {
      dragBtn.classList.toggle('active');
      const enabled = dragBtn.classList.contains('active');
      document.getElementById('coord-system').setAttribute('drag-rotate', 'enabled', enabled);
      // Disable look-controls when dragging to avoid conflict
      if (enabled) {
        mainCam.setAttribute('look-controls', 'enabled', false);
      } else {
        mainCam.setAttribute('look-controls', 'enabled', true);
      }
    });

    /* ══════════════ Training Animation ══════════════ */
    const trainLiveBtn = document.getElementById('train-live-btn');
    const trainPanel = document.getElementById('train-panel');
    const trainEpochEl = document.getElementById('train-epoch');
    const trainAccEl = document.getElementById('train-acc');
    const trainLossEl = document.getElementById('train-loss');
    const trainProgressFill = document.getElementById('train-progress-fill');
    const trainPlayBtn = document.getElementById('train-play');
    const trainPrevBtn = document.getElementById('train-prev');
    const trainNextBtn = document.getElementById('train-next');
    const trainCloseBtn = document.getElementById('train-close');
    const trainSpeedSlider = document.getElementById('train-speed');
    const trainSpeedVal = document.getElementById('train-speed-val');

    let trainSnapshots = [];
    let trainPoints = [];
    let trainIdx = 0;
    let trainPlaying = false;
    let trainTimer = null;

    // Enable train button when file is selected
    fileInput.addEventListener('change', () => {
      if (selectedFile) trainLiveBtn.disabled = false;
    });

    trainLiveBtn.addEventListener('click', async () => {
      if (!selectedFile) return;
      trainLiveBtn.disabled = true;
      statusEl.className = 'loading loading-pulse';
      statusEl.textContent = 'Preparing training animation...';

      const formData = new FormData();
      formData.append('file', selectedFile);
      formData.append('epochs', '50');

      try {
        const res = await fetch('/train-animate', { method: 'POST', body: formData });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Training failed');

        trainSnapshots = data.snapshots;
        trainPoints = data.points;
        trainIdx = 0;

        statusEl.className = 'success';
        statusEl.textContent = `${trainSnapshots.length} snapshots ready. Playing...`;

        // Show train panel, NN container, controls
        trainPanel.style.display = 'block';
        trainPanel.classList.add('fade-in');
        legend.classList.add('shifted-up');

        const nnContainer = document.getElementById('nn-container');
        nnContainer.setAttribute('visible', true);
        const nnToggleBtn = document.getElementById('toggle-nn');
        nnToggleBtn.style.display = '';
        nnToggleBtn.classList.add('active');

        // Ensure controls are visible
        controlsPanel.style.display = 'block';
        legend.style.display = 'block';

        // Render initial points
        renderTrainPoints();

        // Render first snapshot
        renderTrainSnapshot(0);

        // Auto-play
        trainPlaying = true;
        trainPlayBtn.textContent = 'Pause';
        playTraining();

        trainLiveBtn.disabled = false;

      } catch (err) {
        statusEl.className = 'error';
        statusEl.textContent = err.message;
        trainLiveBtn.disabled = false;
      }
    });

    function renderTrainPoints() {
      const pointsContainer = document.getElementById('data-points');
      pointsContainer.innerHTML = '';
      const radius = parseFloat(document.getElementById('point-size').value);

      trainPoints.forEach((pt, idx) => {
        const sphere = document.createElement('a-sphere');
        sphere.setAttribute('position', `${pt.x} ${pt.y} ${pt.z}`);
        sphere.setAttribute('radius', String(radius));
        sphere.setAttribute('color', COLORS[pt.label] || '#ffffff');
        sphere.setAttribute('material',
          `opacity: 0.92; metalness: 0.2; roughness: 0.5; emissive: ${COLORS[pt.label] || '#ffffff'}; emissiveIntensity: 0.05`);
        sphere.setAttribute('class', 'interactive data-point');
        sphere.setAttribute('hover-highlight', 'scaleFactor: 1.5');
        sphere.dataset.px = pt.x.toFixed(3);
        sphere.dataset.py = pt.y.toFixed(3);
        sphere.dataset.pz = pt.z.toFixed(3);
        sphere.dataset.label = pt.label;
        sphere.dataset.idx = idx;
        sphere.addEventListener('mouseenter', function(e) {
          const d = this.dataset;
          showTooltip(this, `
            <div class="tt-title">Data Point #${d.idx}</div>
            <div class="tt-row">X: <strong>${d.px}</strong></div>
            <div class="tt-row">Y: <strong>${d.py}</strong></div>
            <div class="tt-row">Z: <strong>${d.pz}</strong></div>
            <div class="tt-divider"></div>
            <div class="tt-row">Class: <strong style="color:${COLORS[d.label]}">${COLOR_NAMES[d.label] || d.label}</strong></div>
          `, e.detail && e.detail.cursorEl ? null : e);
        });
        sphere.addEventListener('mouseleave', function() { hideTooltip(this); });
        pointsContainer.appendChild(sphere);
      });
    }

    function renderTrainSnapshot(idx) {
      const snap = trainSnapshots[idx];
      if (!snap) return;

      // Update stats
      trainEpochEl.textContent = snap.epoch;
      trainAccEl.textContent = snap.accuracy + '%';
      trainLossEl.textContent = snap.loss.toFixed(4);
      trainProgressFill.style.width = ((idx + 1) / trainSnapshots.length * 100) + '%';

      // Update boundary
      const planeContainer = document.getElementById('decision-boundary');
      planeContainer.innerHTML = '';
      const opacity = parseFloat(document.getElementById('plane-opacity').value);
      const step = 5.0 / 15; // lower res for animation

      snap.boundary.forEach(pt => {
        const box = document.createElement('a-box');
        box.setAttribute('position', `${pt.x} ${pt.y} ${pt.z}`);
        box.setAttribute('width', String(step));
        box.setAttribute('height', String(step));
        box.setAttribute('depth', String(step));
        box.setAttribute('material',
          `color: #ff88cc; opacity: ${opacity}; transparent: true; side: double; metalness: 0.05; roughness: 0.9`);
        box.setAttribute('class', 'plane-cell');
        planeContainer.appendChild(box);
      });

      // Update NN neurons and connections
      renderTrainNetwork(snap);

      // Update button states
      trainPrevBtn.disabled = idx === 0;
      trainNextBtn.disabled = idx === trainSnapshots.length - 1;
    }

    function renderTrainNetwork(snap) {
      const neuronsEl = document.getElementById('nn-neurons');
      const connectionsEl = document.getElementById('nn-connections');
      const labelsEl = document.getElementById('nn-labels');
      neuronsEl.innerHTML = '';
      connectionsEl.innerHTML = '';
      labelsEl.innerHTML = '';

      const layers = snap.layers;
      const weights = snap.weights;
      const activations = snap.activations;
      const numLayers = layers.length;

      const totalWidth = 8;
      const maxHeight = 4;
      const layerSpacing = totalWidth / (numLayers - 1);
      const startX = -totalWidth / 2;
      const MAX_DISPLAY = 12;
      const positions = [];

      for (let l = 0; l < numLayers; l++) {
        const n = layers[l];
        const displayN = Math.min(n, MAX_DISPLAY);
        const spacing = displayN > 1 ? maxHeight / (displayN - 1) : 0;
        const startY = displayN > 1 ? -maxHeight / 2 : 0;
        const x = startX + l * layerSpacing;
        const layerPos = [];

        for (let j = 0; j < displayN; j++) {
          const y = startY + j * spacing;
          layerPos.push({ x, y, z: 0 });

          let intensity = 0.5;
          if (activations && activations[l] && activations[l][j] !== undefined) {
            const maxAct = Math.max(...activations[l].map(Math.abs), 1e-8);
            intensity = Math.min(1.0, Math.abs(activations[l][j]) / maxAct);
          }

          const color = LAYER_COLORS[l % LAYER_COLORS.length];
          const radius = l === 0 || l === numLayers - 1 ? 0.15 : 0.11;
          const sphere = document.createElement('a-sphere');
          sphere.setAttribute('position', `${x} ${y} 0`);
          sphere.setAttribute('radius', String(radius));
          sphere.setAttribute('material',
            `color: ${color}; opacity: ${0.5 + intensity * 0.5}; emissive: ${color}; emissiveIntensity: ${0.2 + intensity * 0.5}; metalness: 0.3; roughness: 0.4`);
          neuronsEl.appendChild(sphere);
        }

        const labelName = l < NN_LAYER_LABELS.length ? NN_LAYER_LABELS[l] : `Layer ${l}`;
        const label = document.createElement('a-text');
        label.setAttribute('value', `${labelName}\n(${n})`);
        label.setAttribute('position', `${x} ${maxHeight / 2 + 0.6} 0`);
        label.setAttribute('color', LAYER_COLORS[l % LAYER_COLORS.length]);
        label.setAttribute('scale', '0.45 0.45 0.45');
        label.setAttribute('align', 'center');
        labelsEl.appendChild(label);

        positions.push(layerPos);
      }

      // Connections (lighter version for animation perf)
      for (let l = 0; l < numLayers - 1; l++) {
        const fromPos = positions[l];
        const toPos = positions[l + 1];
        const W = weights[l];
        const maxW = Math.max(...W.flat().map(Math.abs), 1e-8);

        for (let i = 0; i < fromPos.length; i++) {
          for (let j = 0; j < toPos.length; j++) {
            let wVal = (W[i] && W[i][j] !== undefined) ? W[i][j] : 0;
            const normalizedW = Math.abs(wVal) / maxW;
            if (normalizedW < 0.15) continue; // higher threshold for animation perf

            const from = fromPos[i], to = toPos[j];
            const mx = (from.x + to.x) / 2, my = (from.y + to.y) / 2;
            const dx = to.x - from.x, dy = to.y - from.y;
            const length = Math.sqrt(dx * dx + dy * dy);
            const rotZ = -Math.atan2(dx, dy) * (180 / Math.PI);
            const color = wVal >= 0 ? '#4499ff' : '#ff4466';

            const cyl = document.createElement('a-cylinder');
            cyl.setAttribute('position', `${mx} ${my} 0`);
            cyl.setAttribute('height', String(length));
            cyl.setAttribute('radius', String(0.005 + normalizedW * 0.018));
            cyl.setAttribute('rotation', `0 0 ${rotZ}`);
            cyl.setAttribute('material',
              `color: ${color}; opacity: ${0.1 + normalizedW * 0.3}; transparent: true; emissive: ${color}; emissiveIntensity: 0.15`);
            connectionsEl.appendChild(cyl);
          }
        }
      }
    }

    function playTraining() {
      if (trainTimer) clearTimeout(trainTimer);
      if (!trainPlaying) return;

      if (trainIdx < trainSnapshots.length) {
        renderTrainSnapshot(trainIdx);
        trainIdx++;
        const speed = parseInt(trainSpeedSlider.value);
        trainTimer = setTimeout(playTraining, speed);
      } else {
        trainPlaying = false;
        trainPlayBtn.textContent = 'Replay';
      }
    }

    trainPlayBtn.addEventListener('click', () => {
      if (trainPlaying) {
        // Pause
        trainPlaying = false;
        if (trainTimer) clearTimeout(trainTimer);
        trainPlayBtn.textContent = 'Play';
      } else {
        // Play / Replay
        if (trainIdx >= trainSnapshots.length) trainIdx = 0;
        trainPlaying = true;
        trainPlayBtn.textContent = 'Pause';
        playTraining();
      }
    });

    trainPrevBtn.addEventListener('click', () => {
      if (trainIdx > 0) {
        trainPlaying = false;
        if (trainTimer) clearTimeout(trainTimer);
        trainPlayBtn.textContent = 'Play';
        trainIdx--;
        renderTrainSnapshot(trainIdx);
      }
    });

    trainNextBtn.addEventListener('click', () => {
      if (trainIdx < trainSnapshots.length - 1) {
        trainPlaying = false;
        if (trainTimer) clearTimeout(trainTimer);
        trainPlayBtn.textContent = 'Play';
        trainIdx++;
        renderTrainSnapshot(trainIdx);
      }
    });

    trainCloseBtn.addEventListener('click', () => {
      trainPlaying = false;
      if (trainTimer) clearTimeout(trainTimer);
      trainPanel.style.display = 'none';
      legend.classList.remove('shifted-up');
    });

    trainSpeedSlider.addEventListener('input', () => {
      trainSpeedVal.textContent = trainSpeedSlider.value;
    });

    /* ══════════════ Keyboard Shortcuts ══════════════ */
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      switch (e.key.toLowerCase()) {
        case 'r':
          rotateBtn.click();
          break;
        case 'g':
          dragBtn.click();
          break;
        case 't':
          themeToggle.click();
          break;
        case ' ':
          e.preventDefault();
          if (trainPanel.style.display === 'block') trainPlayBtn.click();
          break;
        case 'arrowleft':
          if (trainPanel.style.display === 'block') trainPrevBtn.click();
          break;
        case 'arrowright':
          if (trainPanel.style.display === 'block') trainNextBtn.click();
          break;
        case 'escape':
          if (trainPanel.style.display === 'block') {
            trainCloseBtn.click();
          } else if (tooltipPinned) {
            tooltipPinned = false;
            tooltipTarget = null;
            tooltip.classList.remove('pinned');
            tooltip.style.display = 'none';
          }
          break;
      }
    });
  </script>

</body>
