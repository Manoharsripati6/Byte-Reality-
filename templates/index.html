      });
    }
    wireSimSlider(simCountSlider, document.getElementById('sim-count-val'), 'count', false);
    wireSimSlider(simSpeedSlider, document.getElementById('sim-speed-val'), 'speed', true);
    wireSimSlider(simSepSlider, document.getElementById('sim-sep-val'), 'separation', true);
    wireSimSlider(simAlignSlider, document.getElementById('sim-align-val'), 'alignment', true);
    wireSimSlider(simCohSlider, document.getElementById('sim-coh-val'), 'cohesion', true);

    document.getElementById('sim-pause').addEventListener('click', function() {
      const comp = simContainer.components['boids-simulation'];
      const nowEnabled = comp.data.enabled;
      simContainer.setAttribute('boids-simulation', 'enabled', !nowEnabled);
      this.textContent = nowEnabled ? 'Resume' : 'Pause';
      if (typeof socket !== 'undefined') socket.emit('sim_pause', { enabled: !nowEnabled });
    });
    document.getElementById('sim-reset').addEventListener('click', () => {
      const comp = simContainer.components['boids-simulation'];
      if (comp) comp.resetBoids();
      if (typeof socket !== 'undefined') socket.emit('sim_reset', {});
    });
    document.getElementById('sim-close').addEventListener('click', () => {
      simActive = false;
      simContainer.setAttribute('boids-simulation', 'enabled', false);
      simContainer.setAttribute('visible', false);
      simPanel.style.display = 'none';
      simToggleBtn.style.borderColor = 'rgba(68,220,255,0.4)';
      simToggleBtn.style.background = 'transparent';
      if (typeof socket !== 'undefined') socket.emit('sim_close', {});
    });

    /* ══════════════ Keyboard Shortcuts ══════════════ */
    document.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT') return;
      switch (e.key.toLowerCase()) {
        case 'r':
          rotateBtn.click();
          break;
        case 'g':
          dragBtn.click();
          break;
        case 't':
          themeToggle.click();
          break;
        case 's':
          simToggleBtn.click();
          break;
        case ' ':
          e.preventDefault();
          if (trainPanel.style.display === 'block') trainPlayBtn.click();
          break;
        case 'arrowleft':
          if (trainPanel.style.display === 'block') trainPrevBtn.click();
          break;
        case 'arrowright':
          if (trainPanel.style.display === 'block') trainNextBtn.click();
          break;
        case 'escape':
          if (simPanel.style.display === 'block') {
            document.getElementById('sim-close').click();
          } else if (trainPanel.style.display === 'block') {
            trainCloseBtn.click();
          } else if (tooltipPinned) {
            tooltipPinned = false;
            tooltipTarget = null;
            tooltip.classList.remove('pinned');
            tooltip.style.display = 'none';
          }
          break;
      }
    });
    /* ══════════════ Real-time Sync (Socket.IO) ══════════════ */
    const socket = io({ transports: ['websocket', 'polling'] });
    let isSyncSource = false; // true if THIS client triggered the viz

    socket.on('connect', () => {
      console.log('[Sync] Connected:', socket.id);
      // Show connected indicator
      const dot = document.createElement('div');
      dot.id = 'sync-dot';
      dot.style.cssText = 'position:fixed;top:8px;right:60px;width:10px;height:10px;border-radius:50%;background:#44ff88;z-index:999;box-shadow:0 0 6px #44ff88;';
      dot.title = 'Synced';
      document.body.appendChild(dot);
      socket.emit('request_sync');
    });

    socket.on('disconnect', () => {
      console.log('[Sync] Disconnected');
      const dot = document.getElementById('sync-dot');
      if (dot) dot.style.background = '#ff4444';
    });

    // Another client triggered Visualize — load the results here too
    socket.on('viz_ready', async (data) => {
      if (isSyncSource) { isSyncSource = false; return; } // skip if we triggered it
      console.log('[Sync] Received viz_ready from another client');

      const mi = data.model_info;
      statusEl.className = 'success';
      statusEl.textContent = `[Synced] Trained on ${data.num_points} points.`;

      // Update info panel
      let infoHTML = '';
      if (mi.model_type === 'svm') {
        infoHTML = `<span class="model-badge badge-svm">SVM (Linear)</span>
          <div class="info-row">Points: <strong>${data.num_points}</strong></div>
          <div class="info-row">Accuracy: <strong>${mi.accuracy}%</strong></div>`;
        document.getElementById('legend-boundary-text').textContent = 'SVM Decision Plane';
      } else if (mi.model_type === 'linear_regression') {
        infoHTML = `<span class="model-badge badge-lr">Linear Regression</span>
          <div class="info-row">Points: <strong>${data.num_points}</strong></div>
          <div class="info-row">R\u00b2: <strong>${mi.r_squared}</strong></div>`;
        document.getElementById('legend-boundary-text').textContent = 'Regression Surface';
      } else if (mi.model_type === 'neural_network') {
        infoHTML = `<span class="model-badge badge-nn">Neural Network</span>
          <div class="info-row">Points: <strong>${data.num_points}</strong></div>
          <div class="info-row">Accuracy: <strong>${mi.accuracy}%</strong></div>
          <div class="info-row">Layers: <strong>${mi.layers.join(' \u2192 ')}</strong></div>`;
        document.getElementById('legend-boundary-text').textContent = 'NN Decision Boundary';
      } else if (mi.model_type === 'knn') {
        infoHTML = `<span class="model-badge badge-knn">K-Nearest Neighbors</span>
          <div class="info-row">Points: <strong>${data.num_points}</strong></div>
          <div class="info-row">Accuracy: <strong>${mi.accuracy}%</strong></div>`;
        document.getElementById('legend-boundary-text').textContent = 'KNN Decision Boundary';
      } else if (mi.model_type === 'decision_tree') {
        infoHTML = `<span class="model-badge badge-dt">Decision Tree</span>
          <div class="info-row">Points: <strong>${data.num_points}</strong></div>
          <div class="info-row">Accuracy: <strong>${mi.accuracy}%</strong></div>`;
        document.getElementById('legend-boundary-text').textContent = 'Decision Tree Boundary';
      } else if (mi.model_type === 'random_forest') {
        infoHTML = `<span class="model-badge badge-rf">Random Forest</span>
          <div class="info-row">Points: <strong>${data.num_points}</strong></div>
          <div class="info-row">Accuracy: <strong>${mi.accuracy}%</strong></div>`;
        document.getElementById('legend-boundary-text').textContent = 'Random Forest Boundary';
      }
      infoHTML += `<div class="info-row" style="margin-top:4px;">Boundary pts: <strong>${data.num_boundary_points}</strong></div>`;
      infoContent.innerHTML = infoHTML;
      infoPanel.style.display = 'block';
      infoPanel.classList.add('fade-in');

      await loadVisualization(mi.model_type);

      const nnContainer = document.getElementById('nn-container');
      const nnToggleBtn = document.getElementById('toggle-nn');
      if (mi.model_type === 'neural_network') {
        await renderNeuralNetwork();
        nnContainer.setAttribute('visible', true);
        nnToggleBtn.style.display = '';
        nnToggleBtn.classList.add('active');
      } else {
        nnContainer.setAttribute('visible', false);
        nnToggleBtn.style.display = 'none';
        nnToggleBtn.classList.remove('active');
        document.getElementById('nn-neurons').innerHTML = '';
        document.getElementById('nn-connections').innerHTML = '';
        document.getElementById('nn-labels').innerHTML = '';
      }

      statusEl.textContent = '[Synced] Visualization ready!';
      legend.style.display = 'block';
      controlsPanel.style.display = 'block';
      triggerTitleAnimation();
    });

    // Another client triggered Train Live — play animation here too
    socket.on('train_ready', (data) => {
      if (isSyncSource) { isSyncSource = false; return; }
      console.log('[Sync] Received train_ready from another client');

      trainSnapshots = data.snapshots;
      trainPoints = data.points;
      trainIdx = 0;

      statusEl.className = 'success';
      statusEl.textContent = `[Synced] ${trainSnapshots.length} snapshots. Playing...`;

      trainPanel.style.display = 'block';
      trainPanel.classList.add('fade-in');
      legend.classList.add('shifted-up');

      const nnContainer = document.getElementById('nn-container');
      nnContainer.setAttribute('visible', true);
      const nnToggleBtn = document.getElementById('toggle-nn');
      nnToggleBtn.style.display = '';
      nnToggleBtn.classList.add('active');
      controlsPanel.style.display = 'block';
      legend.style.display = 'block';

      renderTrainPoints();
      renderTrainSnapshot(0);
      trainPlaying = true;
      trainPlayBtn.textContent = 'Pause';
      playTraining();
    });

    // Sync simulation toggle
    socket.on('sim_toggle', (data) => {
      simActive = data.active;
      simContainer.setAttribute('visible', simActive);
      simContainer.setAttribute('boids-simulation', 'enabled', simActive);
      simPanel.style.display = simActive ? 'block' : 'none';
      simToggleBtn.style.borderColor = simActive ? 'rgba(68,220,255,0.8)' : 'rgba(68,220,255,0.4)';
      simToggleBtn.style.background = simActive ? 'rgba(68,220,255,0.1)' : 'transparent';
    });

    // Sync simulation settings
    socket.on('sim_settings', (data) => {
      if (data.attr && data.val !== undefined) {
        simContainer.setAttribute('boids-simulation', data.attr, data.val);
        // Update slider UI
        const sliderMap = { count: simCountSlider, speed: simSpeedSlider, separation: simSepSlider, alignment: simAlignSlider, cohesion: simCohSlider };
        const valMap = { count: 'sim-count-val', speed: 'sim-speed-val', separation: 'sim-sep-val', alignment: 'sim-align-val', cohesion: 'sim-coh-val' };
        if (sliderMap[data.attr]) { sliderMap[data.attr].value = data.val; }
        if (valMap[data.attr]) { const el = document.getElementById(valMap[data.attr]); if (el) el.textContent = data.val; }
      }
    });

    // ── Sync: Theme toggle ──
    socket.on('theme_change', (data) => {
      isDark = data.isDark;
      applyTheme();
    });

    // ── Sync: Model selection ──
    socket.on('model_select', (data) => {
      selectedModel = data.model;
      document.querySelectorAll('.model-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.model === data.model);
      });
    });

    // ── Sync: Toggle elements (points/plane/axes/env/nn) ──
    socket.on('toggle_element', (data) => {
      const btn = document.getElementById(data.btnId);
      const target = document.getElementById(data.targetId);
      if (btn && target) {
        if (data.active) { btn.classList.add('active'); } else { btn.classList.remove('active'); }
        target.setAttribute('visible', data.active);
      }
    });

    // ── Sync: Camera controls (rotate/drag) ──
    socket.on('camera_control', (data) => {
      if (data.type === 'rotate') {
        const rb = document.getElementById('toggle-rotate');
        if (data.active) rb.classList.add('active'); else rb.classList.remove('active');
        document.getElementById('coord-system').setAttribute('auto-rotate', 'enabled', data.active);
      } else if (data.type === 'drag') {
        const db = document.getElementById('toggle-drag');
        if (data.active) db.classList.add('active'); else db.classList.remove('active');
        document.getElementById('coord-system').setAttribute('drag-rotate', 'enabled', data.active);
        const mainCam = document.getElementById('main-camera');
        mainCam.setAttribute('look-controls', 'enabled', !data.active);
      }
    });

    // ── Sync: Sliders (point size, plane opacity) ──
    socket.on('slider_change', (data) => {
      if (data.type === 'pointSize') {
        pointSizeSlider.value = data.val;
        pointSizeVal.textContent = parseFloat(data.val).toFixed(2);
        document.querySelectorAll('.data-point').forEach(el => el.setAttribute('radius', data.val));
      } else if (data.type === 'planeOpacity') {
        planeOpSlider.value = data.val;
        planeOpVal.textContent = parseFloat(data.val).toFixed(2);
        document.querySelectorAll('.plane-cell').forEach(el => el.setAttribute('material', 'opacity', data.val));
      }
    });

    // ── Sync: Simulation pause/resume ──
    socket.on('sim_pause', (data) => {
      simContainer.setAttribute('boids-simulation', 'enabled', data.enabled);
      document.getElementById('sim-pause').textContent = data.enabled ? 'Pause' : 'Resume';
    });

    // ── Sync: Simulation reset ──
    socket.on('sim_reset', () => {
      const comp = simContainer.components['boids-simulation'];
      if (comp) comp.resetBoids();
    });

    // ── Sync: Simulation close ──
    socket.on('sim_close', () => {
      simActive = false;
      simContainer.setAttribute('boids-simulation', 'enabled', false);
      simContainer.setAttribute('visible', false);
      simPanel.style.display = 'none';
      simToggleBtn.style.borderColor = 'rgba(68,220,255,0.4)';
      simToggleBtn.style.background = 'transparent';
    });

    // ── Sync: Training controls ──
    socket.on('train_control', (data) => {
      if (data.action === 'play') {
        if (trainIdx >= trainSnapshots.length) trainIdx = 0;
        trainPlaying = true;
        trainPlayBtn.textContent = 'Pause';
        playTraining();
      } else if (data.action === 'pause') {
        trainPlaying = false;
        if (trainTimer) clearTimeout(trainTimer);
        trainPlayBtn.textContent = 'Play';
      } else if (data.action === 'prev' && trainIdx > 0) {
        trainPlaying = false;
        if (trainTimer) clearTimeout(trainTimer);
        trainPlayBtn.textContent = 'Play';
        trainIdx--;
        renderTrainSnapshot(trainIdx);
      } else if (data.action === 'next' && trainIdx < trainSnapshots.length - 1) {
        trainPlaying = false;
        if (trainTimer) clearTimeout(trainTimer);
        trainPlayBtn.textContent = 'Play';
        trainIdx++;
        renderTrainSnapshot(trainIdx);
      } else if (data.action === 'close') {
        trainPlaying = false;
        if (trainTimer) clearTimeout(trainTimer);
        trainPanel.style.display = 'none';
        legend.classList.remove('shifted-up');
      } else if (data.action === 'speed') {
        trainSpeedSlider.value = data.val;
        trainSpeedVal.textContent = data.val;
      }
    });

    // Mark this client as the source before uploading so we don't double-render
    uploadBtn.addEventListener('click', () => { isSyncSource = true; }, true);
    trainLiveBtn.addEventListener('click', () => { isSyncSource = true; }, true);
  </script>

</body>
</html>
